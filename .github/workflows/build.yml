name: Build libmihomo Android

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      mihomo_version:
        description: "Версия mihomo (например v1.19.20). Пусто = взять из go.mod"
        required: false
        default: ""

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_ver.outputs.version }}
      tag: ${{ steps.get_ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          
      - name: Update mihomo version
        if: ${{ github.event.inputs.mihomo_version != '' }}
        run: |
          go get github.com/metacubex/mihomo@${{ github.event.inputs.mihomo_version }}
          
      - name: Determine version and tag
        id: get_ver
        run: |
          VER=$(go list -m -f '{{.Version}}' github.com/metacubex/mihomo)
          echo "version=$VER" >> $GITHUB_OUTPUT
          
          TAG="${{ github.ref_name }}"
          if[ -z "$TAG" ] || [ "$TAG" = "refs/heads/main" ] ||[ "$TAG" = "main" ]; then
            TAG="$VER"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            goarch: arm64
            goarm: ""
            triple: aarch64-linux-android
          - abi: armeabi-v7a
            goarch: arm
            goarm: "7"
            triple: armv7a-linux-androideabi
          - abi: x86_64
            goarch: amd64
            goarm: ""
            triple: x86_64-linux-android

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Update mihomo version
        if: ${{ github.event.inputs.mihomo_version != '' }}
        run: go get github.com/metacubex/mihomo@${{ github.event.inputs.mihomo_version }}

      - name: Prepare modules
        run: go mod tidy

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d
          add-to-path: false

      - name: Build ${{ matrix.abi }}
        env:
          CGO_ENABLED: "1"
          GOOS: android
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_LDFLAGS: "-Wl,-soname,libmihomo.so"
        run: |
          export CC="${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.triple }}21-clang"
          export CXX="${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.triple }}21-clang++"
          
          echo "CC=$CC"
          
          go build \
            -buildmode=c-shared \
            -trimpath \
            -buildvcs=false \
            -ldflags="-s -w" \
            -o libmihomo_${{ matrix.abi }}.so \
            .
            
          ls -lh libmihomo_${{ matrix.abi }}.so

      - uses: actions/upload-artifact@v4
        with:
          name: libmihomo_${{ matrix.abi }}
          path: libmihomo_${{ matrix.abi }}.so
          retention-days: 3

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: "libmihomo ${{ needs.prepare.outputs.tag }}"
          body: |
            Mihomo (Clash.Meta) **${{ needs.prepare.outputs.version }}** скомпилирован как Android shared library.

            | Файл | ABI | Устройства |
            |---|---|---|
            | `libmihomo_arm64-v8a.so` | arm64 | Все современные Android |
            | `libmihomo_armeabi-v7a.so` | armv7 | 32-bit ARM |
            | `libmihomo_x86_64.so` | x86_64 | Эмуляторы |

            Плагин подтягивает нужный файл автоматически по ABI устройства.
          files: artifacts/*.so
          make_latest: true
