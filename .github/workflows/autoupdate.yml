name: Auto-update mihomo

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Get latest mihomo release
        id: latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release view --repo MetaCubeX/mihomo --json tagName --jq .tagName)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Latest mihomo: $TAG"

      - name: Get current version in go.mod
        id: current
        run: |
          VER=$(go list -m -f '{{.Version}}' github.com/metacubex/mihomo)
          echo "ver=$VER" >> $GITHUB_OUTPUT
          echo "Current in go.mod: $VER"

      - name: Compare versions
        id: diff
        run: |
          LATEST="${{ steps.latest.outputs.tag }}"
          CURRENT="${{ steps.current.outputs.ver }}"
          if [ "$LATEST" = "$CURRENT" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Already up to date ($CURRENT)"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Update needed: $CURRENT → $LATEST"
          fi

      - name: Update go.mod and go.sum
        if: steps.diff.outputs.changed == 'true'
        run: |
          go get github.com/metacubex/mihomo@${{ steps.latest.outputs.tag }}
          go mod tidy

      - name: Commit and tag
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add go.mod go.sum
          git commit -m "chore: bump mihomo to ${{ steps.latest.outputs.tag }}"
          git tag ${{ steps.latest.outputs.tag }}
          git push origin HEAD:main
          git push origin ${{ steps.latest.outputs.tag }}
